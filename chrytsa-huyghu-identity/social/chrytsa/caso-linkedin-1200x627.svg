    </g>
    
    <g id="logo">
      <use href="#crown" x="60" y="511" width="67.2" height="56"></use>
      <text x="141.2" y="546.7" font-family="Cinzel,Georgia,serif" font-weight="600" font-size="22" fill="#F4D773" letter-spacing="1.3199999999999998">GRUPO CHRYTSA</text>
      <text x="141.2" y="564.7" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="10" fill="#B8862B" letter-spacing="3.2">ASESORES</text>
      <text x="1140" y="563" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="11" fill="#8B5E1A" letter-spacing="1.98">@grupochrytsa</text>
