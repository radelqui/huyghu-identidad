    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(212,175,55,.18)"></stop><stop offset="1" stop-color="rgba(212,175,55,0)"></stop></linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.4" r="0.8"><stop offset="0" stop-color="rgba(212,175,55,0)"></stop><stop offset="1" stop-color="rgba(0,0,0,.45)"></stop></radialGradient>
    <pattern id="grain" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse"><circle cx="10" cy="20" r=".7" fill="#F4D773" opacity=".06"></circle><circle cx="35" cy="50" r=".5" fill="#F4D773" opacity=".05"></circle><circle cx="60" cy="15" r=".6" fill="#F4D773" opacity=".06"></circle><circle cx="70" cy="65" r=".4" fill="#F4D773" opacity=".04"></circle><circle cx="20" cy="70" r=".5" fill="#F4D773" opacity=".05"></circle></pattern>
    <clipPath id="sphereClip"><circle cx="50" cy="50" r="42"></circle></clipPath>
    <symbol id="sphere" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="42" fill="#0A0A0A"></circle>
      <g clip-path="url(#sphereClip)">
        <path d="M50 8A42 42 0 0 0 8 50 42 42 0 0 0 50 92Q30 70 30 50Q30 30 50 8Z" fill="url(#g)"></path>
        <g transform="skewY(-7)"><rect x="8" y="28" width="84" height="6" fill="url(#g)"></rect><rect x="8" y="44" width="84" height="6" fill="url(#g)"></rect><rect x="8" y="60" width="84" height="6" fill="url(#g)"></rect></g>
      </g>
    </symbol>
    <symbol id="crown" viewBox="0 0 120 100">
      <path d="M 22 32 Q 60 6 98 32" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round"></path>
      <path d="M 28 36 Q 60 14 92 36" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" opacity=".7"></path>
      <path d="M 18 50 Q 60 38 102 50" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"></path>
      <text x="60" y="92" text-anchor="middle" font-family="Cinzel,Georgia,serif" font-weight="700" font-size="76" fill="#FFFFFF">G</text>
    </symbol>
  </defs>

    
    <rect id="bg" width="1200" height="627" fill="#0A0A0A"></rect>
    <rect width="1200" height="627" fill="url(#grain)" opacity=".7"></rect>
    <rect width="1200" height="627" fill="url(#vignette)"></rect>
    
  
    
    <rect x="0" y="0" width="1200" height="6" fill="url(#g)"></rect>
    <g id="eyebrow" transform="translate(600,90)">
      <text text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="600" font-size="16" fill="#B8862B" letter-spacing="6">▶ CASO DE ÉXITO · 2025</text>
      <text y="38" text-anchor="middle" font-family="Cinzel,Georgia,serif" font-weight="500" font-size="28" fill="#F4D773" letter-spacing="2">[Cliente Ejemplo]</text>
    </g>
    
    <g id="metric" transform="translate(600,344.85)">
      <text text-anchor="middle" font-family="Cinzel,Georgia,serif" font-weight="700" font-size="180" fill="url(#g)" dominant-baseline="middle">−18%</text>
    </g>
    <g id="subtitle" transform="translate(600,489.06)">
      <rect x="-120" y="0" width="240" height="1" fill="url(#g)"></rect>
      <text y="36" text-anchor="middle" font-family="Cinzel,Georgia,serif" font-weight="500" font-size="22" fill="#e8dfc6" letter-spacing="1">Reducción carga fiscal efectiva</text>
      <text y="64" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#bcb29a" letter-spacing="2">12 meses · 2024 → 2025 · dentro de norma DGII</text>
    </g>
    <g id="testimonio" transform="translate(600,0)" opacity="0">
      <text text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-style="italic" font-size="20" fill="#8a7f6a">&#34;HUYGHU detectó deducciones que dejábamos sobre la mesa</text>
      <text y="28" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-style="italic" font-size="20" fill="#8a7f6a">cada año. Cifras verificables, sin trucos.&#34;</text>
