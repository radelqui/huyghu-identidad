    <rect id="bg" width="1080" height="1080" fill="#0A0A0A"></rect>
    <rect width="1080" height="1080" fill="url(#grain)" opacity=".7"></rect>
    <rect width="1080" height="1080" fill="url(#vignette)"></rect>
    
  
    <g id="headline" font-family="Cormorant Garamond,Georgia,serif" font-style="italic" font-weight="500" fill="#F4D773" text-anchor="middle">
      <text x="540" y="377.59999999999997" font-size="64">&#34;El cumplimiento</text><text x="540" y="448" font-size="64">fiscal no es</text><text x="540" y="518.4" font-size="64">una carga.</text><text x="540" y="588.8" font-size="64">Es la garantía</text><text x="540" y="659.2" font-size="64">de tranquilidad.&#34;</text>
    </g>
    <g id="attribution" transform="translate(540,744.4)">
      <rect x="-80" y="0" width="160" height="1" fill="url(#g)"></rect>
      <text x="0" y="36" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" fill="#bcb29a" letter-spacing="2">— [Nombre Socio Director]</text>
      <text x="0" y="60" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="14" fill="#B8862B" letter-spacing="3">GRUPO CHRYTSA</text>
    </g>
    
    <g id="logo">
      <use href="#crown" x="60" y="964" width="67.2" height="56"></use>
      <text x="141.2" y="999.7" font-family="Cinzel,Georgia,serif" font-weight="600" font-size="22" fill="#F4D773" letter-spacing="1.3199999999999998">GRUPO CHRYTSA</text>
      <text x="141.2" y="1017.7" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="10" fill="#B8862B" letter-spacing="3.2">ASESORES</text>
      <text x="1020" y="1016" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="11" fill="#8B5E1A" letter-spacing="1.98">@grupochrytsa</text>
